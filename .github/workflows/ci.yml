name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: passwd
          MARIADB_USER: passwd
          MARIADB_PASSWORD: passwd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      CI: true
      MARIADB_HOST: 127.0.0.1
      MARIADB_ROOT_PASSWORD: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            back/package-lock.json
            front/package-lock.json

      - name: Install MariaDB client
        run: sudo apt-get update && sudo apt-get install -y mariadb-client

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix back
          npm ci --prefix front

      - name: Set up test database
        run: bash test/db/setup-ci-db.sh

      - name: Frontend unit tests
        run: npm run test:front

      - name: Frontend production build
        run: VITE_API_URL=/api npm run test:build

      - name: API integration tests
        run: |
          node --env-file=back/.env.test back/server.js &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"
          for attempt in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Backend did not become ready"
              exit 1
            fi
            sleep 1
          done
          npm run verify:api

      - name: Stop backend
        if: always()
        run: kill "$BACKEND_PID" 2>/dev/null || true

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e
